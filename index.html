        async function fetchWithRetry(url, options, maxRetries = 4) {
            let retries = 0;
            while (retries < maxRetries) {
                try {
                    const response = await fetch(url, options);
                    if (response.status === 429) {
                        const waitTime = Math.pow(2, retries) * 1500;
                        await new Promise(res => setTimeout(res, waitTime));
                        retries++; continue;
                    }
                    return response;
                } catch (e) {
                    if (retries === maxRetries - 1) throw e;
                    await new Promise(res => setTimeout(res, Math.pow(2, retries) * 1000));
                    retries++;
                }
            }

        function base64ToArrayBuffer(base64) {
            try {
                const binaryString = window.atob(base64.replace(/\s/g, ''));
                const bytes = new Uint8Array(binaryString.length);
                for (let i = 0; i < binaryString.length; i++) bytes[i] = binaryString.charCodeAt(i);
                return bytes.buffer;
            } catch (e) { return null; }
        }

        function pcmToWav(pcmData, sampleRate) {
            const dataSize = pcmData.length * 2;
            const buffer = new ArrayBuffer(44 + dataSize);
            const view = new DataView(buffer);
            const writeString = (v, o, s) => { for (let i = 0; i < s.length; i++) v.setUint8(o + i, s.charCodeAt(i)); };
            writeString(view, 0, 'RIFF');
            view.setUint32(4, 36 + dataSize, true);
            writeString(view, 8, 'WAVE');
            writeString(view, 12, 'fmt ');
            view.setUint32(16, 16, true);
            view.setUint16(20, 1, true);
            view.setUint16(22, 1, true);
            view.setUint32(24, sampleRate, true);
            view.setUint32(28, sampleRate * 2, true);
            view.setUint16(32, 2, true);
            view.setUint16(34, 16, true);
            writeString(view, 36, 'data');
            view.setUint32(40, dataSize, true);
            for (let i = 0; i < pcmData.length; i++) view.setInt16(44 + i * 2, pcmData[i], true);
            return new Blob([buffer], { type: 'audio/wav' });
        }

                        <div className="max-w-[100rem] mx-auto w-full space-y-32">
                            <div className="text-center space-y-8">
                                <h2 className="text-9xl font-black italic uppercase tracking-tighter leading-none">The 44-Node Temple</h2>
                                <p className="text-purple-400 font-mono text-xs uppercase tracking-[2em]">✨ Subconscious calibration via symbolic pattern-math</p>
                            </div>
                            <div className="grid grid-cols-2 sm:grid-cols-4 lg:grid-cols-6 gap-12 px-8">
                                {nodes.map((n, i) => (
                                    <div key={i} onClick={() => triggerNodeInquiry(n)} className="node-card p-14 rounded-[4rem] cursor-pointer relative group overflow-hidden text-center glass border border-white/5">
                                        <div className="absolute inset-0 bg-purple-500/10 translate-y-full group-hover:translate-y-0 transition-transform duration-700" />
                                        <div className="relative z-10 space-y-8">
                                            <span className="text-[11px] font-mono text-white/20 block tracking-widest uppercase">Node {String(i+1).padStart(2,'0')}</span>
                                            <h3 className="text-sm font-black uppercase tracking-[0.3em] leading-tight h-16 flex items-center justify-center group-hover:text-purple-300 transition-colors">{n}</h3>
                                            <div className={`w-6 h-6 rounded-full mx-auto transition-all duration-700 shadow-[0_0_30px_rgba(139,92,246,1)] ${codexData[n] ? 'bg-purple-500' : 'bg-white/5 border border-white/10'}`} />
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>

                    {activeInquiry && (
                        <div className="fixed inset-0 z-[1500] flex items-center justify-center p-10 bg-black/95 backdrop-blur-3xl">
                            <div className="glass p-28 rounded-[8rem] w-full max-w-5xl space-y-16 relative overflow-hidden ai-shimmer">
                                <button onClick={() => setActiveInquiry(null)} className="absolute top-20 right-20 text-white/20 hover:text-white transition-all text-sm font-mono tracking-widest">[ Kill Protocol ]</button>
                                <span className="text-purple-400 font-mono text-xs font-black uppercase tracking-widest animate-pulse">✨ Sovereign Architect Briefing</span>
                                <h2 className="text-7xl font-black italic uppercase leading-none tracking-tighter mission-gradient">{activeInquiry.name}</h2>
                                <p className="text-3xl font-light italic leading-relaxed text-white/90 font-serif border-l-4 border-purple-500 pl-16 py-10">{activeInquiry.text}</p>
                                <div className="space-y-10">
                                    <textarea value={userRealization} onChange={e => setUserRealization(e.target.value)} placeholder="Commit realization to the Loop..." className="w-full h-52 bg-white/5 border border-white/10 p-12 rounded-[5rem] font-mono text-xl focus:border-purple-500 outline-none text-white shadow-inner resize-none" />
                                    <button onClick={commitRealization} disabled={isGenerating || !userRealization} className="w-full py-12 bg-purple-600 rounded-[4rem] font-black uppercase tracking-widest hover:bg-white hover:text-black transition-all flex items-center justify-center gap-8 text-sm">
                                        {isGenerating ? "Analyzing Patterns..." : "Commit Vector to Temple"}
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    <section id="portal">
                        <div className="max-w-7xl mx-auto w-full">
                            <div class="glass p-32 rounded-[9rem] border-white/5 space-y-24 relative overflow-hidden">
                                <div className="absolute -top-[30rem] -right-[30rem] w-[60rem] h-[60rem] bg-blue-600/10 rounded-full blur-[200px]" />
                                <div className="flex flex-col lg:flex-row gap-32 items-center">
                                    <div className="flex-1 space-y-16 text-left">
                                        <h2 className="text-[10rem] font-black italic uppercase tracking-tighter leading-none">Manifest<br/>Terminal</h2>
                                        <p className="text-white/50 text-3xl font-light italic leading-relaxed border-l-4 border-purple-500 pl-12">"Mapping legacy domain metrics to the Infinite nature current."</p>
                                        <div className="space-y-10">
                                            <input type="text" value={legacyData.domain} onChange={e => setLegacyData({...legacyData, domain: e.target.value})} placeholder="Legacy Environment/Business" className="w-full p-12 bg-white/5 border border-white/10 rounded-[4rem] font-mono text-2xl focus:border-purple-500 outline-none text-white" />
                                            <input type="text" value={legacyData.anchor} onChange={e => setLegacyData({...legacyData, anchor: e.target.value})} placeholder="Frequency Constant" className="w-full p-12 bg-white/5 border border-white/10 rounded-[4rem] font-mono text-2xl focus:border-purple-500 outline-none text-white" />
                                            <button onClick={executeSynthesis} disabled={isGenerating} className="w-full py-14 bg-white text-black font-black uppercase rounded-[5rem] hover:bg-purple-600 hover:text-white transition-all text-xs">✨ Execute M.C.L. Synthesis</button>
                                        </div>
                                    </div>
                                    <div className="w-full lg:w-[35rem] aspect-square flex items-center justify-center relative">
                                        <div className="absolute inset-0 rounded-full border border-white/10 animate-spin-slow" />
                                        <div className="absolute inset-8 rounded-full border border-purple-500/20 animate-reverse-spin" />
                                        <div class="absolute inset-24 rounded-full bg-white/5 flex items-center justify-center border border-white/10">
                                            <span className="text-xs font-black uppercase text-white/10 tracking-[2em] animate-pulse">Awaiting Signal</span>
                                        </div>
                                    </div>
                                </div>
                                {synthesisResult && (
                                    <div className="p-20 glass rounded-[6rem] border-purple-500/30 animate-in slide-in-from-bottom-20 duration-1000 text-left">
                                        <span className="text-purple-400 font-mono text-xs font-black uppercase tracking-widest block mb-10">✨ Sovereign Directive: Pattern-Math Alignment</span>
                                        <p className="text-4xl italic font-serif leading-relaxed text-white/90">"{synthesisResult}"</p>
                                    </div>
                                )}
                            </div>
                        </div>
                    </section>

                    <footer className="py-64 text-center border-t border-white/5 bg-black">
                        <ImageWithFallback src="Gemini_Generated_Image_4bzl0r4bzl0r4bzl.jpg" alt="VCG Mark" className="w-48 h-48 mx-auto rounded-full border border-white/10 p-4 opacity-40 grayscale hover:opacity-100 transition-all duration-2000" fallbackText="VCG GLOBAL" />
                        <p className="text-xl font-mono text-white/30 uppercase tracking-[2em] pt-16">Proprietary Dominion</p>
                        <p className="text-[10px] font-mono text-purple-500/40 uppercase tracking-[1em] pt-4">Storylinehero Codex &bull; Established Patterns &bull; v5.3</p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
